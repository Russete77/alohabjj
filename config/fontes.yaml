# ─────────────────────────────────────────────────────────────
# 6) DESCOBERTA AUTOMÁTICA DE NOVOS CANAIS (passo semanal do Radar)
#    Propõe candidatos -> curadoria humana -> entra nas listas acima.
# ─────────────────────────────────────────────────────────────
discovery:
  enabled: true
  cadence: weekly
  queries:
    - "jiu-jitsu análise luta"
    - "bjj breakdown match analysis"
    - "grappling technique breakdown"
    - "adcc / ibjjf análise"
  min_subscribers: 5000        # filtro de relevância
  min_uploads_last_90d: 3      # canal ativo
  approval_required: true      # nunca entra sem seu ok
  candidates_out: config/canais_candidatos.yaml
