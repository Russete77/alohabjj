# config/fontes.yaml
# Fontes do Radar/Pesquisador — BjjcomLucas AI Platform
# Regra: web/RSS/YouTube = FONTE (ler). Instagram/TikTok = distribuição, NÃO fonte.
# Idiomas: muitas fontes são "en"; a localização p/ PT-BR acontece no Analista.
# channel_id null nos canais de YouTube -> rode ingestion/resolve_channels.py p/ preencher.
#
# priority: 1 = puxar todo dia | 2 = puxar diário, peso menor | 3 = semanal/eventual
# category: news | analysis | technique | events | org | own

meta:
  timezone: America/Sao_Paulo
  localize_to: pt-BR          # dossiê final sempre em PT-BR (feito no Analista)
  rss_default_suffix: "/feed/"  # WordPress
  youtube_rss_pattern: "https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}"

# ─────────────────────────────────────────────────────────────
# 1) PORTAIS DE NOTÍCIA — INTERNACIONAL (web / RSS)
# ─────────────────────────────────────────────────────────────
news_web_intl:
  - name: FloGrappling
    url: https://www.flograppling.com/
    type: web
    lang: en            # tem seção PT-BR também
    category: news
    priority: 1
    notes: Maior cobertura de eventos/rankings; fonte primária.

  - name: BJJ Heroes
    url: https://www.bjjheroes.com/
    rss: https://www.bjjheroes.com/feed
    type: web
    lang: en
    category: news
    priority: 1
    notes: Notícias + base de atletas -> fonte-verdade p/ dados de atleta (validação).

  - name: BJJ News (agregador)
    url: https://www.bjjnews.com/
    type: web
    lang: en
    category: news
    priority: 1
    notes: Feed agregador de várias fontes; quase um Radar pronto.

  - name: Jits Magazine
    url: https://www.jitsmagazine.com/
    type: web
    lang: en
    category: news
    priority: 2

  - name: Grappling Insider
    url: https://grapplinginsider.com/
    type: web
    lang: en
    category: news
    priority: 2

