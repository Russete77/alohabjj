# config/catalogo.yaml
# Catálogo de conversão — BjjcomLucas AI Platform (PRD §9.2, §12)
#
# Estratégia (decidida com o Lucas):
#  1) TODA peça de conteúdo tenta ASSOCIAR um produto RELEVANTE à pauta (afiliado campeão
#     de vendas que tenha a ver com a notícia — ex.: luta No-Gi de leg lock → instrucional de
#     leg lock; final de gi no Mundial → kimono de competição).
#  2) Também existem peças FOCADAS em venda (produto no centro), formato `separado`.
#  Prioridade quando há empate de relevância: curso (margem ~100%) > BJJ3D próprio > afiliado.
#  Relevância acima de margem — sem encaixe honesto, o Supervisor NÃO força CTA.
#
# Casamento por `tags` + `gatilho`: o Supervisor cruza as tags do dossiê (modo gi/no-gi,
# técnicas, evento, atleta) com as tags do produto e escolhe o de maior aderência.
# disclosure_obrigatorio: true -> divulgação CONAR na 1ª linha da caption (#publi).
# url_base: null = VOCÊ preenche com o link real (afiliado/loja). Sem link real, o Supervisor
# ainda associa o produto mas marca `precisa_link: true` pra você completar antes de publicar.

produtos:
  # ─────────────── PRÓPRIOS (âncoras) ───────────────
  - id: curso
    nome: "100kg – Domínio Absoluto"
    tipo: proprio
    prioridade: 1
    tags: [controle, pressao, base, guarda, passagem, fundamentos, gi, nogi, iniciante, evergreen]
    gatilho: "conteúdo técnico/didático de controle, pressão, base ou leitura de jogo"
    url_base: https://alohabjjnews.com/
    margem: 1.0
    cupom: ""
    disclosure_obrigatorio: false
    gancho: "Curso gratuito de jogo de pressão e controle — leva do conteúdo ao aprofundamento."
    cta_sugerido: "Curso 100kg – Domínio Absoluto, grátis no link"

  - id: bjj3d
    nome: "Loja BJJ3D"
    tipo: proprio
    prioridade: 2
