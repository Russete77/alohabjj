# config/catalogo.yaml
# Catálogo de conversão — BjjcomLucas AI Platform (PRD §9.2, §12)
# Prioridade decidida: curso (margem ~100%, digital) > BJJ3D próprio > afiliado.
# Relevância acima de margem; sem encaixe honesto, o Supervisor NÃO força CTA.
#
# disclosure_obrigatorio: true  -> Supervisor injeta divulgação CONAR na 1ª linha da caption
#                                  (selo "parceria paga"/"conteúdo promocional" + #publi).

produtos:
  - id: curso
    nome: "100kg – Domínio Absoluto"   # nome real do curso (do acervo)
    tipo: proprio            # curso digital gratuito hospedado no site
    prioridade: 1
    url_base: https://alohabjjnews.com/   # acesso pelo menu do site / link na bio
    margem: 1.0             # ~100% (digital, próprio)
    gancho: >
      Curso gratuito "100kg – Domínio Absoluto": jogo de pressão e controle.
      Leva o público do conteúdo pro aprofundamento.
    disclosure_obrigatorio: false   # produto próprio gratuito; sem relação de afiliação paga
    cta_sugerido: "Curso 100kg – Domínio Absoluto, grátis no link"

  - id: bjj3d
    nome: "Loja BJJ3D"
    tipo: proprio            # loja própria
    prioridade: 2
    url_base: null           # TODO: URL da loja BJJ3D (você tem)
    margem: null             # TODO: margem real
    gancho: >
      Loja BJJ3D — produtos exclusivos para quem vive o Jiu-Jitsu dentro e fora do tatame.
    disclosure_obrigatorio: false
    cta_sugerido: "🛒 Loja BJJ3D no link"

  - id: hayabusa
    nome: "Hayabusa"
    tipo: afiliado           # afiliado (comissão por performance)
    prioridade: 3
    url_base: null           # TODO: link de afiliado Hayabusa (você tem)
    cupom: "LUCAS"           # cupom real: -10%
    desconto: "-10%"
    margem: null             # comissão real do programa
    gancho: >
      Equipamento Hayabusa de alto desempenho — cupom LUCAS -10%.
    disclosure_obrigatorio: true    # CONAR: afiliado = conteúdo promocional (§12)
    cta_sugerido: "🥊 Hayabusa com cupom LUCAS -10% (parceria)"

# Regras de CTA (Supervisor de Vendas):
# - 1 CTA por peça.
# - Formato integrado (CTA suave no último slide) OU peça de venda separada, por dossiê.
# - Aprende com tracking/clicks.csv qual produto x ângulo x formato converte.
