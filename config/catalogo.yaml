# Regras de CTA (Supervisor de Vendas):
# - 1 CTA por peça. Formato `integrado` (CTA suave no último slide) ou `separado` (peça de venda).
# - Associar SEMPRE que houver produto relevante à pauta; sem encaixe honesto → curso ou sem_cta.
# - Afiliado/remunerado => disclosure CONAR + #publi na 1ª linha. "Link na bio" não conta.
# - Aprende com tracking/clicks.csv qual produto × ângulo × formato converte.
