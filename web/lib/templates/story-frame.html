<!--
  Template de arte AlohaBJJ / @bjjcomlucas — frame de Story/Reel (recriação HTML/CSS).
  Formato base 1080x1350 (4:5, capa de Reel / feed). Para Story 9:16 use STORY_H=1920.
  Tokens substituídos pelo render (HTML->PNG):
    {{HEADLINE}}  — headline (topo/capa) vinda do agente Instagram Publisher
    {{ATLETA}}    — /templates/atleta.png (recorte transparente); vazio => silhueta placeholder
    {{AVATAR}}    — /templates/avatar.png
  Cores da marca: teal #1A9CB4 · vermelho #D8232A · tinta #0C333B.
-->
<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<style>
  :root{
    --teal:#1A9CB4; --teal-dark:#16879C; --red:#D8232A; --ink:#0C333B; --white:#fff;
    --W:1080px; --H:1350px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:var(--W);height:var(--H)}
  .stage{position:relative;width:var(--W);height:var(--H);background:var(--teal);
    overflow:hidden;font-family:"Arial",Helvetica,sans-serif;color:var(--white)}

  /* avatar @bjjcomlucas — topo direito */
  .avatar{position:absolute;top:34px;right:40px;width:104px;height:104px;border-radius:50%;
    background:#fff;overflow:hidden;border:4px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar.placeholder{display:flex;align-items:center;justify-content:center;color:var(--teal);
    font-size:13px;font-weight:700;text-align:center}

  /* zona de headline — topo livre */
  .headline{position:absolute;top:150px;left:64px;right:64px;
    font-family:"Arial Black","Arial",sans-serif;font-weight:800;
    font-size:82px;line-height:1.04;letter-spacing:-.5px;color:var(--white);
    text-transform:uppercase;text-shadow:0 2px 12px rgba(0,0,0,.10)}
  .headline .hl{color:var(--white)}
  .headline .hl-red{color:#ffd7d7}

  /* linha vermelha vertical (acento) */
  .accent{position:absolute;left:404px;top:742px;width:9px;height:268px;background:var(--red);border-radius:0}

  /* atleta recortado — inferior esquerdo */
  .atleta{position:absolute;left:-10px;bottom:0;width:420px;height:600px;
    display:flex;align-items:flex-end;justify-content:center}
  .atleta img{width:100%;height:auto;object-fit:contain;object-position:bottom}
  .atleta.placeholder{border:3px dashed rgba(255,255,255,.45);border-radius:14px;margin:0 18px 90px;
    width:360px;height:470px;align-items:center;color:rgba(255,255,255,.7);font-size:15px;font-weight:700}

  /* rodapé — ACESSE / site */
  .footer{position:absolute;left:420px;bottom:150px;color:var(--ink)}
  .footer .line1{display:flex;align-items:center;gap:12px;font-size:34px;font-weight:800;letter-spacing:.5px}
  .footer .globe{width:34px;height:34px;border:3px solid var(--ink);border-radius:50%;position:relative}
  .footer .globe::before{content:"";position:absolute;inset:2px 14px;border-left:3px solid var(--ink)}
  .footer .globe::after{content:"";position:absolute;inset:14px 2px;border-top:3px solid var(--ink)}
  .footer .site{margin-top:10px;font-family:"Arial Black","Arial",sans-serif;font-weight:800;
    font-size:52px;letter-spacing:-.5px;color:var(--ink)}
  .footer .site b{color:var(--red)}

  /* botão SIGA PARA MAIS BJJ */
  .cta{position:absolute;left:24px;bottom:66px;background:var(--red);color:#fff;
    font-weight:800;font-size:33px;letter-spacing:.5px;padding:16px 26px;border-radius:6px}

  /* faixa de marca-d'água no pé */
  .strip{position:absolute;left:0;right:0;bottom:0;height:46px;background:var(--teal-dark);
    display:flex;align-items:center;gap:70px;padding-left:14px;overflow:hidden}
  .strip span{color:rgba(255,255,255,.55);font-weight:800;font-size:22px;letter-spacing:1px;white-space:nowrap}
</style>
</head>
<body>
  <div class="stage">
    <div class="headline">{{HEADLINE}}</div>
    <div class="accent"></div>

    <!-- atleta: troque a classe/placeholder quando /templates/atleta.png existir -->
    <div class="atleta placeholder">atleta.png<br/>(recorte transparente)</div>

    <div class="avatar placeholder">@bjjcom<br/>lucas</div>

    <div class="footer">
      <div class="line1"><span class="globe"></span>ACESSE:</div>
      <div class="site">ALOHA<b>BJJ</b>NEWS.COM</div>
    </div>

    <div class="cta">SIGA PARA MAIS BJJ</div>

    <div class="strip">
      <span>@BJJCOMLUCAS</span><span>@BJJCOMLUCAS</span><span>@BJJCOMLUCAS</span>
      <span>@BJJCOMLUCAS</span><span>@BJJCOMLUCAS</span><span>@BJJCOMLUCAS</span>
    </div>
  </div>
</body>
</html>
