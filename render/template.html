<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px}          /* 4:5 Instagram */
  .slide{width:1080px;height:1350px;position:relative;overflow:hidden;
    background:#171313 {{HERO_BG}};background-size:cover;background-position:center;
    color:#F4F1EE;font-family:'Segoe UI',system-ui,sans-serif;
    padding:96px 84px;display:flex;flex-direction:column;justify-content:space-between}
  .slide::before{content:"";position:absolute;inset:0;
    background:radial-gradient(120% 80% at 80% -10%,#E22A2A40,transparent 60%),
               linear-gradient(180deg,transparent 40%,#0B0909cc 100%)}
  .top{position:relative;display:flex;justify-content:space-between;align-items:center;
    font-family:ui-monospace,Consolas,monospace;font-size:26px;letter-spacing:.14em;
    text-transform:uppercase;color:#C7C0B9}
  .top .bg{color:#E22A2A;font-weight:700}
  .body{position:relative}
  .kicker{font-family:ui-monospace,Consolas,monospace;font-size:28px;letter-spacing:.16em;
    text-transform:uppercase;color:#E22A2A;margin-bottom:28px;font-weight:600}
  h1{font-size:82px;line-height:1.06;font-weight:800;color:#fff;letter-spacing:-.02em;max-width:16ch}
  p{font-size:38px;line-height:1.45;color:#E4DDD5;margin-top:34px;max-width:24ch}
  .cta{display:inline-block;margin-top:40px;background:#E22A2A;color:#fff;font-weight:800;
    font-size:40px;padding:26px 44px;border-radius:16px}
  .foot{position:relative;display:flex;flex-direction:column;gap:26px}
  .sign{font-size:26px;color:#948E87;font-style:italic}
  .strip{display:flex;gap:10px}
  .strip i{height:9px;flex:1;border-radius:5px;background:#33302D}
  .strip i.on{background:#E22A2A}
</style></head><body>
  <div class="slide">
    <div class="top"><span>AlohaBJJ</span><span class="bg">@bjjcomlucas</span></div>
    <div class="body">
      <div class="kicker">{{KICKER}}</div>
      <h1>{{TITULO}}</h1>
      <p>{{CORPO}}</p>
      {{CTA}}
    </div>
    <div class="foot">
      <div class="sign">{{SIGN}}</div>
      <div class="strip">{{STRIP}}</div>
    </div>
  </div>
</body></html>
